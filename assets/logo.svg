<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Three converging data streams forming a funnel/flux shape -->
  <!-- Left stream -->
  <path d="M80 120 L200 240 L256 256" stroke="#6366F1" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <!-- Center stream -->
  <path d="M256 80 L256 240 L256 256" stroke="#6366F1" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Right stream -->
  <path d="M432 120 L312 240 L256 256" stroke="#6366F1" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <!-- Convergence point - solid circle -->
  <circle cx="256" cy="256" r="20" fill="#6366F1"/>
  <!-- Output stream - single unified line downward -->
  <path d="M256 276 L256 432" stroke="#6366F1" stroke-width="28" stroke-linecap="round"/>
  <!-- Small dots on input streams representing data points -->
  <circle cx="110" cy="146" r="8" fill="#6366F1" opacity="0.5"/>
  <circle cx="256" cy="120" r="8" fill="#6366F1" opacity="0.7"/>
  <circle cx="402" cy="146" r="8" fill="#6366F1" opacity="0.5"/>
  <!-- Tick marks on output representing normalized traces -->
  <line x1="240" y1="340" x2="272" y2="340" stroke="#6366F1" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="240" y1="370" x2="272" y2="370" stroke="#6366F1" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
  <line x1="240" y1="400" x2="272" y2="400" stroke="#6366F1" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
</svg>
